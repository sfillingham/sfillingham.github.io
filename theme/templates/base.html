<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ SITENAME }}{% endblock %}</title>
    <meta name="description" content="{% block description %}Sean P. Fillingham — Technical AI Governance, Systems Safety, STAMP/STPA for Frontier AI{% endblock %}">
    <link rel="stylesheet" href="{{ SITEURL }}/theme/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="site-nav">
        <div class="nav-inner">
            <a href="{{ SITEURL }}/" class="nav-name">{{ AUTHOR }}</a>
            <div class="nav-links">
                {% for title, link in MENUITEMS %}
                <a href="{{ SITEURL }}{{ link }}"{% if page and page.slug == title|lower %} class="active"{% endif %}>{{ title }}</a>
                {% endfor %}
            </div>
            <button class="nav-toggle" aria-label="Toggle menu">
                <span></span><span></span>
            </button>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p>&copy; {{ AUTHOR }} · Built with <a href="https://getpelican.com">Pelican</a></p>
        </div>
    </footer>

    <script>
        document.querySelector('.nav-toggle').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('open');
            this.classList.toggle('open');
        });
    </script>

</body>
</html>
